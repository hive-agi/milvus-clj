name: release

# Patch-bump and publish only when the push actually changes the library.
# README / CI / test-only commits do not mint a version, because a published
# pom is immutable on both Clojars and the private registry.
on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'resources/**'
      - 'deps.edn'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: DeLaGuardo/setup-clojure@13.0
        with:
          cli: latest

      - name: Bump patch version
        run: clojure -T:build bump :level :patch

      - name: Commit and tag
        run: |
          VER=$(cat VERSION)
          git config user.name  "hive-ci"
          git config user.email "ci@hive-agi.local"
          git add VERSION
          # [skip ci] stops this push from retriggering the workflow.
          git commit -m "chore(release): $VER [skip ci]"
          # Annotated: `git push --follow-tags` ignores lightweight tags,
          # which would publish the artifact and silently drop the tag.
          git tag -a "v$VER" -m "release $VER"
          git push --follow-tags

      - name: Deploy
        env:
          CLOJARS_USERNAME: ${{ secrets.CLOJARS_USERNAME }}
          CLOJARS_PASSWORD: ${{ secrets.CLOJARS_DEPLOY_TOKEN }}
        run: clojure -T:build deploy
